openapi: 3.0.3
info:
  title: API Archivo
  description: API para gestión de usuarios, préstamos, inventario y roles.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Servidor local
paths:
  /users:
    get:
      summary: Obtener todos los usuarios
      security:
        - bearerAuth: []
      tags:
        - Users
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GetUserDtoResponse'
  /users/{id}:
    get:
      summary: Obtener usuario por id
      security:
        - bearerAuth: []
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: UUID del usuario
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserDtoResponse'
  /users/login:
    post:
      summary: Autenticar usuario
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthUserRequestDto'
      responses:
        '200':
          description: Token y datos del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserDtoResponse'
  /users/create:
    post:
      summary: Crear un nuevo usuario
      security:
        - bearerAuth: []
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequestDto'
      responses:
        '201':
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserDtoResponse'
  /users/update/{id}:
    put:
      summary: Actualizar usuario
      security:
        - bearerAuth: []
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequestDto'
      responses:
        '200':
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserDtoResponse'
  /users/delete/{id}:
    delete:
      summary: Eliminar usuario
      security:
        - bearerAuth: []
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Usuario eliminado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserDtoResponse'
  /loans/requests:
    post:
      summary: Solicitar préstamo
      tags:
        - Loans
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestLoanBody'
      responses:
        '200':
          description: Solicitud creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
  /loans/{id}/approve:
    post:
      summary: Aprobar préstamo
      tags:
        - Loans
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveLoanBody'
      responses:
        '200':
          description: Préstamo aprobado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
  /loans/{id}/acta:
    get:
      summary: Generar acta de préstamo (PDF)
      tags:
        - Loans
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: PDF de acta de préstamo
          content:
            application/pdf:
              schema:
                type: string
                format: binary
  /inventory/boxes:
    post:
      summary: Crear caja de inventario
      tags:
        - Inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBoxBody'
      responses:
        '200':
          description: Caja creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
  /inventory/{type}:
    get:
      summary: Obtener inventario por tipo
      tags:
        - Inventory
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [box, folder, record, document]
      responses:
        '200':
          description: Inventario obtenido
          content:
            application/json:
              schema:
                type: object
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    GetUserDtoResponse:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        active:
          type: boolean
      required:
        - id
        - username
        - email
        - active
    AuthUserRequestDto:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password
    AuthUserDtoResponse:
      type: object
      properties:
        token:
          type: string
        id:
          type: string
        username:
          type: string
      required:
        - token
        - id
        - username
    CreateUserRequestDto:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        email:
          type: string
      required:
        - username
        - password
        - email
    CreateUserDtoResponse:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
      required:
        - id
        - username
        - email
    UpdateUserRequestDto:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        active:
          type: boolean
    UpdateUserDtoResponse:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
      required:
        - id
        - username
        - email
    RequestLoanBody:
      type: object
      properties:
        id:
          type: string
        requesterId:
          type: string
        targetId:
          type: string
        targetType:
          type: string
        notes:
          type: string
      required:
        - id
        - requesterId
        - targetId
        - targetType
    ApproveLoanBody:
      type: object
      properties:
        archivistId:
          type: string
        dueDate:
          type: string
          format: date-time
      required:
        - archivistId
        - dueDate
    CreateBoxBody:
      type: object
      properties:
        id:
          type: string
        locationCode:
          type: string
        metadata:
          type: object
          additionalProperties: true
        conservationStatus:
          type: string
      required:
        - id
        - locationCode
    SuccessMessage:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
      required:
        - status
        - message
